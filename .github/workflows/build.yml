name: Build BDG rec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        id: bump
        run: |
          # Read version from CMakeLists.txt
          VERSION=$(grep -oP 'VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Check if this tag already exists
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            # Tag exists — bump version (patch +1, roll over at 9)
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -gt 9 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -gt 9 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

            # Update CMakeLists.txt
            sed -i "s/VERSION ${VERSION}/VERSION ${NEW_VERSION}/" CMakeLists.txt

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add CMakeLists.txt
            git commit -m "chore: bump version to ${NEW_VERSION}"
            git push
          fi

          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          # Create and push tag
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  build-macos:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --target BDG_REC --config Release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate LEIA-ME.txt
        shell: bash
        run: |
          VERSION=$(grep -oE 'VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | awk '{print $2}')
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^v${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- ci:\|^- chore:\|^- docs:" || true)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -10 | grep -v "^- ci:\|^- chore:\|^- docs:" || true)
          fi
          awk -v ver="$VERSION" -v changes="$CHANGES" '{gsub(/\$VERSION/, ver); gsub(/\$CHANGES/, changes); print}' resources/LEIA-ME.template.txt > resources/LEIA-ME.txt

      - name: Create DMG
        run: |
          mkdir -p dist
          rm -f dist/BDG_REC_macOS.dmg
          create-dmg \
            --volname "BDG rec" \
            --background "resources/fundo-instalacao.png" \
            --window-pos 200 120 \
            --window-size 600 323 \
            --icon-size 80 \
            --icon "BDG rec.app" 430 130 \
            --app-drop-link 170 130 \
            --add-file "LEIA-ME.txt" "resources/LEIA-ME.txt" 300 290 \
            --text-size 13 \
            --no-internet-enable \
            "dist/BDG_REC_macOS.dmg" \
            "build/BDG_REC_artefacts/Release/BDG rec.app"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: BDG_REC_macOS
          path: dist/BDG_REC_macOS.dmg

  build-windows:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          submodules: recursive

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --target BDG_REC --config Release

      - name: Package
        run: |
          mkdir dist
          copy "build\BDG_REC_artefacts\Release\BDG rec.exe" "dist\BDG_REC.exe"
        shell: cmd

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: BDG_REC_Windows
          path: dist/BDG_REC.exe

  release:
    needs: [version, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: BDG_REC_macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: BDG_REC_Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            BDG_REC_macOS.dmg
            BDG_REC.exe
          generate_release_notes: true
